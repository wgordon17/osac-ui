flow: Create virtual machine wizard
statechart_ref: ../statecharts/create-virtual-machine-wizard.statechart.yaml

template_inventory_alignment:
  normative_spec: ../template-catalog-wizard-api-alignment.yaml
  rule: >-
    The **catalog** wizard step MUST NOT use embedded template lists as the sole source for picker cards.
    It MUST reuse the same **compute_instance_catalog_items** client + TanStack Query as **vm-template-catalog** (CatalogPage).
    Underlying **compute_instance_templates** are fetched separately for customization defaults via the catalog item's `template` reference.

applies_when: >-
  Authenticated tenant user or tenant admin workspace. Wizard is always a Modal layered over the
  current route; wizard progress is not represented in the URL (no path segment or query param for
  step index). Step order, validation, and in-progress draft are held **client-side** in React state
  (see backend-fulfillment.yaml create_virtual_machine_wizard_client_orchestration).

current_product_note_wizard_template_only: >-
  Shipped wizard is **catalog-item-only**: ordered steps **catalog → customization → review** (no deployment
  picker). Multi-path worksheets below remain for RESTORE when new/clone return. Catalog customization
  maps draft fields to fulfillment **ComputeInstance.spec** top-level keys (e.g. cores, memory_gib, boot_disk,
  additional_disks, run_strategy **Always** | **Halted**, subnet, security_groups, ssh_key, user_data, optional
  image)—the wizard does **not** populate **template_parameters** or **field_definitions** yet. On finalize the SPA builds
  **ComputeInstance** JSON with **`spec.catalog_item`** (not `spec.template`) via `buildComputeInstanceFromWizardDraft` and **POST**s to
  **POST /api/fulfillment/v1/compute_instances** (same handler from Dashboard, Catalog, and My VMs).
  **GET** list polling for compute instances does not replace or cancel that POST.

terminology:
  wizard_chrome: >-
    PatternFly 6 Wizard hosted inside Modal: WizardHeader, WizardBody with a left-hand WizardNav
    (one WizardNavItem per ordered step for the active path), step body in the main column,
    WizardFooter with Back / Next or Create virtual machine / Cancel grouped in a Flex row.
    Modal must not duplicate the WizardHeader close control when the wizard body is active.
    **Shipped path:** only template, customization, and review steps appear in WizardNav.
  client_step_orchestration: >-
    Opening the modal initializes client-side wizard state (WizardState in React). Advancing (Next),
    moving back (Back), and finalizing (Create virtual machine) run local step validation in
    wizardBuild.ts; on finalize the SPA builds the ComputeInstance payload and calls
    POST /api/fulfillment/v1/compute_instances via TanStack mutation (useProvisionVm).
    Server-held BFF wizard sessions were removed; do not reintroduce without an upstream contract.
  ephemeral_wizard_routing: >-
    No SPA route or bookmark encodes wizard state; closing the modal abandons the draft.
    Re-open starts a fresh client-side draft.
  three_paths: >-
    Prototype defined three deployment methods (new, template, clone). **Shipped:** template-only.
    Worksheets for new/clone paths below are retained for RESTORE.
  client_nav_draft_sync: >-
    WizardNav order is derived from local draft.mode and entry presets (catalog template id).
    For template-only product, nav is fixed [template, customization, review].

canonical_bff_step_ids:
  description: >-
    activeStepId, advance fromStepId, WizardStep ids, and stepNav[].id use these exact strings
    (kebab-case where noted). UI nav labels are a separate display map (see implementation STEP_LABELS).
  ordered_by_path:
    new: [deployment, guest-os, boot-source, compute, customization, review]
    template: [deployment, template, customization, review]
    clone: [deployment, clone-source, review]
  skip_first_deployment_step:
    when: >-
      POST /sessions with entry=catalog and presetTemplateId (mode=template, template preselected), or
      entry=clone_drawer with presetCloneSourceVmId (mode=clone, source name default).
    then:
      template_ordered: [template, customization, review]
      clone_ordered: [clone-source, review]
    response_flag: skipDeployment boolean true when the deployment step is omitted from ordering.

step_worksheets_status:
  status: prototype_restore_only
  note: >-
    step_worksheets and validation_rules below describe the prototype multi-path + BFF session model.
    Shipped product uses client_step_orchestration (template → customization → review only).

step_worksheets:
  deployment:
    flow_anchor: cvm_wizard_deployment_details
    bff_step_id: deployment
    paths: [new, template, clone]
    operate: >-
      User selects one deployment method new | template | clone by clicking a selectable Card (or the
      Radio in each card header); updates field draft.mode. Next sends advance(fromStepId=deployment, draft)
      so BFF merges draft.mode.
    look: >-
      Three equal-height cards in a responsive grid (stack on narrow viewports, three columns from md+)
      with icon + Radio in CardHeader, title and short description in CardBody; template card may show
      a compact “recommended” Label. Shared layout class `osac-deploy-options` (see global.css). Nav
      label “Select a creation method” (STEP_LABELS.deployment in app + BFF).
    validate_client: >-
      Next is always enabled on deployment (no local gate); rely on BFF if draft.mode were empty.
    validate_bff: >-
      mode required; error key mode message "Select a deployment method".
    edge_cases: >-
      Changing mode before first advance updates client nav order; prior answers on other-path fields
      may remain in draft until overwritten by later steps or finalize build logic.

  guest-os:
    flow_anchor: cvm_wizard_guest_os
    bff_step_id: guest-os
    paths: [new]
    operate: >-
      User picks platform RHEL | Microsoft Windows | Other Linux via selectable Cards (same card grid
      pattern as deployment; Radio in card header). Family ids stored in osFamilyNew are rhel, windows,
      linux. Changing platform clears osTypeNew. “Operating system version” is a FormSelect always
      rendered below the cards: disabled until a platform is selected, single placeholder option
      “You need to choose an OS first.”; when enabled, placeholder “Select a version…” plus options from
      OS_TYPES[osFamilyNew] (demo list in constants). Updates osFamilyNew and osTypeNew.
    look: >-
      Title + intro Content; `osac-deploy-options` card row; Card / CardHeader / CardBody / Radio /
      PatternFly icons for RHEL and Windows (brand colors); Other Linux uses bundled asset
      `apps/app-frontend/src/assets/guest-os-tux-linux.png` at 28×28. Reserved badge row slot on cards
      for equal heights. FormGroup + FormSelect for version under the cards.
    validate_client: >-
      Next disabled unless osFamilyNew and osTypeNew non-empty.
    validate_bff: >-
      osFamilyNew, osTypeNew required with field-specific errors.
    edge_cases: >-
      Changing family clears type selection in UI when selecting a new family id.

  boot-source:
    flow_anchor: cvm_wizard_boot_source
    bff_step_id: boot-source
    paths: [new]
    operate: User chooses volume | none radios; updates bootSource (volume = boot volume, none = no boot source).
    look: >-
      Title (h2) “Boot source”, then intro Content: “Choose how the virtual machine will start. You can
      attach storage later if needed.” Then a radiogroup of two Radios: (1) label “Boot volume”,
      description “Start the virtual machine with an existing disk image or volume from your workspace.”;
      (2) label “No boot source”, description “Create an empty virtual machine and attach an ISO or volume
      later.” Nav label “Boot source”.
    validate_client: Next disabled until bootSource set.
    validate_bff: bootSource required.
    edge_cases: None special beyond BFF 400 keeps step.

  compute:
    flow_anchor: cvm_wizard_compute
    bff_step_id: compute
    paths: [new]
    operate: Text inputs for vCPU and memory GiB; updates cpuNew, memoryNew (defaults seeded in draft).
    look: >-
      Title (h2) “Compute resources”, then intro Content: “Set vCPU and memory for this instance. Adjust to
      match your workload.” Then Form with two FormGroups: “vCPU count” and “Memory (GiB)” with numeric-style
      TextInputs (field ids cpu, memory). Nav label “Compute resources”.
    validate_client: Next disabled until both trimmed non-empty.
    validate_bff: Same non-empty string checks.
    edge_cases: BFF parseInt on provision coerces invalid numbers to defaults for demo VM build.

  template:
    flow_anchor: cvm_wizard_template
    bff_step_id: template
    paths: [template]
    operate: >-
      FormSelect filters by template icon OS family (all | rhel | windows | linux); FormSelect filters by
      workloadProfile (all | high-performance | analytics | machine-learning | data-processing); link or
      button clears OS + workload + SearchInput. SearchInput matches title, description, tags. Click
      selectable Card (or Radio in card header) sets selectedTemplateId.
    look: >-
      Title (h2) “Templates”, intro Content “Select a template to create your virtual machine from”, then
      toolbar row: OS FormSelect, Workload FormSelect, “Clear filters”
      control, SearchInput. Line showing count of templates after filters (“N template(s) available”) and
      “Select one to continue.” Grid of Cards: OS icon top-left, Radio top-right, title, short description,
      resource summary from template defaults: CPU (**defaults.cores** / normalized defaultCores), Memory (**defaults.memory_gib** / defaultMemoryGib),
      **Storage** (**defaults.boot_disk.size_gib** GiB — same source as catalog cards; not boot-volume PVC text), then Workload Label (High performance /
      Analytics / Machine learning / Data processing). Layout class `osac-template-cards`. Nav label “Templates”.
    validate_client: Next disabled until selectedTemplateId set.
    validate_bff: >-
      selectedTemplateId required; id MUST exist in fulfillment-backed template inventory (same contract as catalog —
      not demo-static VM_TEMPLATES-only membership).
    edge_cases: >-
      Catalog entry with skipDeployment starts on template with template id preset; user may change
      template before advance.

  clone-source:
    flow_anchor: cvm_wizard_source_clone
    bff_step_id: clone-source
    paths: [clone]
    operate: >-
      Enter cloneNewName first, then filter by OS and VM state plus search query; selectable VM cards
      pick source (cloneSourceVmId) and can reset cloneNewName to the source-based default.
    look: >-
      Template-like card selection layout: New VM name TextInput directly under intro, then FormSelect
      filters for OS and state (running/stopped/paused plus all), SearchInput, clear-filters link Button,
      availability counter, then selectable VM cards with OS icon, Radio, VmStatusLabel near radio, name,
      CPU/Memory/Storage key-value summary line, divider, and Created/Owner rows. Nav "Source VM".
    validate_client: Next disabled until cloneSourceVmId and trimmed cloneNewName.
    validate_bff: >-
      Source VM required; name trim non-empty; source exists in fleet; fleet non-empty for clone path.
    edge_cases: Clone drawer preset sets skipDeployment first step clone-source with default name.

  customization:
    flow_anchor: cvm_wizard_customization
    bff_step_id: customization
    paths: [new, template]
    operate: >-
      New path: optional cloudInitUserDataNew only (cloud-init YAML or script); merged on advance.
      Template path: required templateVmName; **vCPU** and **memory (GiB)** inputs map to spec.cores / spec.memory_gib
      (seeded from selected compute_instance_template defaults); **run strategy** select uses wire values **Always**
      or **Halted**; **boot disk GiB** and optional **comma-separated additional disk sizes** map to spec.boot_disk
      and spec.additional_disks; optional subnet id, comma-separated security group ids, SSH public key, optional
      image type + reference, and optional user data map to the matching spec fields. BFF finalize merges the same
      draft fields into the persisted ComputeInstance for mock mode; non-empty cloudInitUserDataNew on new path maps
      to spec.userData when that path is RESTOREd.
    look: >-
      Title (h2) “Customization”. New path: intro Content “Optional cloud-init user data. Leave blank to
      use defaults on create.” then Form with “Cloud-init user data (optional)” TextArea only. Template
      path: intro Content describes adjusting compute, storage, networking, and access; Form with required
      “Virtual machine name”; Tabs — **Overview** (editable vCPU, memory GiB, run strategy), **Storage** (boot
      disk GiB + optional additional disks), **Network** (subnet, security groups), **SSH** (public key),
      **Image & user data** (image source + user data). Nav label “Customization”.
    validate_client: >-
      Template path Next disabled until templateVmName trimmed non-empty, boot disk GiB is a valid integer within
      allowed bounds, vCPU and memory GiB parse as valid integers within policy, and additional-disks field is
      either empty or a valid comma-separated list of GiB sizes.
    validate_bff: >-
      templateVmName required when draft.mode template; boot disk GiB, cores, memory GiB, and additional disks
      format validated before finalize per demo policy.
    edge_cases: Clone path skips this step entirely.

  review:
    flow_anchor: cvm_wizard_review_create
    bff_step_id: review
    paths: [new, template, clone]
    operate: >-
      Read-only review content varies by flow: new uses compact DescriptionList, while template and
      clone use ExpandableSection + DescriptionList/content. startAfterCreate toggle remains available;
      primary becomes Create virtual machine; finalize POST sends draft to the BFF; on success the modal closes
      and the SPA calls **POST /api/fulfillment/v1/compute_instances** with the normalized payload when integrated
      (then invalidates the VM list query); mock mode relies on BFF finalize persistence alone.
    look: >-
      Title (h2) “Review and create” (nav label remains “Review”). Intro Content: “Confirm the choices below,
      then create the virtual machine.” Then Checkbox “Start this virtual machine after creation”
      (binds startAfterCreate), then flow-specific summary. New path keeps a compact DescriptionList
      (operating system, boot source, vCPU, memory, cloud-init user data). Template path renders expanded
      sections aligned with customization: Overview (name, vCPU, memory, run strategy), Storage (boot + additional
      disks), Network (subnet, security groups), SSH, Image & user data. Clone path also uses the same section set,
      populated from the selected source VM;
      Overview includes Deployment=Clone, new virtual machine name, and source virtual machine.
      Footer primary “Create virtual machine”.
    validate_client: Always allowed to attempt finalize (BFF validates full prior steps).
    validate_bff: Re-runs validateStep over all pre-review steps in order for finalize.
    edge_cases: BFF returns fieldErrors on finalize; UI shows Alert on review step.

rbac:
  required_permissions_by_step:
    cvm_modal_closed:
      open_from_dashboard: open_create_vm
      open_from_catalog_template: create_from_template
      open_from_clone_source: clone_vm
    cvm_modal_open:
      use_wizard_shell: use_vm_wizard
    cvm_wizard_deployment_details:
      choose_deployment_method: use_vm_wizard
    cvm_wizard_guest_os:
      select_guest_os: use_vm_wizard
    cvm_wizard_boot_source:
      select_boot_source: use_vm_wizard
    cvm_wizard_compute:
      define_compute: use_vm_wizard
    cvm_wizard_template:
      select_template: create_from_template
    cvm_wizard_source_clone:
      choose_clone_source: clone_vm
    cvm_wizard_customization:
      customize_vm: use_vm_wizard
    cvm_wizard_review_create:
      review_and_provision: provision_vm

steps:
  - id: cvm_modal_closed
    title: Create VM entry points idle
    goal: Modal is not shown; user may open it from dashboard button or catalog or clone action.

    ui:
      components:
        - Button
        - Modal
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - closed
      - open_impending

    interactions:
      - Trigger open from dashboard Create virtual machine.
      - Trigger openFromCatalogTemplate from catalog.
      - Trigger openFromCloneSource from VM actions.

  - id: cvm_modal_open
    title: Create virtual machine modal with PatternFly Wizard
    goal: >-
      Host a real PatternFly Wizard (not a Progress-only stepper) for the three provision paths;
      left WizardNav lists steps for the active path; BFF session id ties nav advances to server-side
      draft and validation.

    ui:
      components:
        - Modal
        - Wizard
        - WizardHeader
        - WizardBody
        - WizardNav
        - WizardNavItem
        - WizardFooter
        - Stack
        - Flex
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - open
      - bff_session_creating
      - wizard_step_active
      - bff_advance_in_flight
      - bff_advance_rejected
      - submitting_finalize
      - error_provision
      - success_provision

    interactions:
      - On open, POST BFF wizard session with entry context (dashboard default, catalog template id, or clone source vm id); store sessionId; render WizardNav from BFF stepNav (or equivalent) in lockstep with active step.
      - Sequential navigation only (Back / Next); WizardNav items are not independently clickable for arbitrary jumps in the demo implementation.
      - Next invokes BFF advance with current step id and step payload; on 4xx validation errors show inline/Alert and remain on step.
      - Back invokes BFF back (or advance with backward intent) per BFF contract; disabled on first step of path.
      - Close modal or Cancel abandons session (DELETE) and resets client wizard state for next open.

  - id: cvm_wizard_deployment_details
    title: Select a creation method
    goal: Choose new VM from scratch from template or clone from existing VM.

    ui:
      components:
        - WizardStep
        - Card
        - CardHeader
        - CardBody
        - Radio
        - Flex
        - FlexItem
        - Label
        - Content
        - Stack
        - Title
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - editing
      - validation_error_none_selected
      - success_method_selected

    interactions:
      - Select one deployment method by card click or Radio; draft.mode drives ordered steps before first advance.
      - Click Next; BFF advance validates mode and returns the next activeStepId + stepNav for the chosen path (new, template, or clone).

  - id: cvm_wizard_guest_os
    title: Guest operating system
    goal: Pick OS family and specific OS type for new VM path only.

    ui:
      components:
        - WizardStep
        - Card
        - CardHeader
        - CardBody
        - Radio
        - Flex
        - FlexItem
        - Content
        - FormGroup
        - FormSelect
        - FormSelectOption
        - Stack
        - Title
        - img
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - hidden_when_not_new
      - editing
      - validation_error_family_or_type_missing
      - success_selection_complete

    interactions:
      - Select guest OS platform via card (or Radio in card); pick OS version from FormSelect when enabled.
      - Click Next when both family and type set; BFF validates before advancing (client-side enablement mirrors required fields).

  - id: cvm_wizard_boot_source
    title: Boot source
    goal: Choose boot volume or no boot source for new VM path.

    ui:
      components:
        - WizardStep
        - Title
        - Content
        - Radio
        - Stack
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - hidden_when_not_new
      - editing
      - validation_error_no_choice
      - success_choice_selected

    interactions:
      - Read step heading and intro; select Boot volume or No boot source (each Radio has a body description).
      - Click Next when choice selected; BFF validates boot source choice before advancing.

  - id: cvm_wizard_compute
    title: Compute resources
    goal: Enter vCPU and memory strings for new VM path.

    ui:
      components:
        - WizardStep
        - Title
        - Content
        - Form
        - FormGroup
        - TextInput
        - Stack
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - hidden_when_not_new
      - editing
      - validation_error_cpu_or_memory_blank
      - success_inputs_non_blank

    interactions:
      - Read step heading and intro; edit vCPU and memory fields (non-empty required for Next); BFF validates before advancing.

  - id: cvm_wizard_template
    title: Templates
    goal: Filter, search, and select a catalog template for the template path.

    ui:
      components:
        - WizardStep
        - Title
        - Content
        - FormSelect
        - FormSelectOption
        - Button
        - SearchInput
        - Card
        - CardHeader
        - CardBody
        - Radio
        - Flex
        - FlexItem
        - Label
        - Stack
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - hidden_when_not_template
      - editing
      - empty_filtered_results
      - validation_error_no_template_selected
      - success_template_selected

    interactions:
      - Filter by OS and workload, optionally clear filters; search narrows list; select one template card.
      - >-
        Template cards populate from **GET /api/fulfillment/v1/compute_instance_templates** (same source as vm-template-catalog),
        not from bundled VM_TEMPLATES alone.
      - Click Next when selectedTemplateId set; BFF validates template id against fulfillment-backed inventory for session tenant context.

  - id: cvm_wizard_source_clone
    title: Source VM for clone
    goal: Search and pick a source VM, then enter the new VM name for the clone path.

    ui:
      components:
        - WizardStep
        - Card
        - CardHeader
        - CardBody
        - Radio
        - FormSelect
        - FormSelectOption
        - SearchInput
        - Button
        - Content
        - Form
        - TextInput
        - Stack
        - VmStatusLabel
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - hidden_when_not_clone
      - editing
      - empty_no_vms_in_fleet
      - empty_no_filter_matches
      - validation_error_missing_source_or_name
      - success_source_and_name_ready

    interactions:
      - Enter New VM name under the intro (required), then filter clone candidates by OS and state, optionally clear filters, and search by text.
      - Select a source VM card to set source and default clone name; cards show OS icon and VmStatusLabel near radio plus CPU/Memory/Storage and Created/Owner details.
      - Click Next when cloneSourceVmId and non-empty cloneNewName and fleet non-empty; BFF validates source exists and name rules before advancing to review.

  - id: cvm_wizard_customization
    title: Customization
    goal: >-
      New path optional cloud-init user data only; template path VM name plus editable **ComputeInstance.spec**
      fields across Overview / Storage / Network / SSH / Image & user data tabs (see step_worksheets.customization).

    ui:
      components:
        - WizardStep
        - Title
        - Content
        - Form
        - FormGroup
        - TextInput
        - TextArea
        - Tabs
        - Tab
        - TabTitleText
        - FormSelect
        - FormSelectOption
        - Stack
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - hidden_when_clone
      - editing_new_path
      - editing_template_path
      - validation_error_template_name_blank
      - success_ready

    interactions:
      - Read step heading and path-specific intro; for template enter virtual machine name (required for Next).
      - For new path set optional cloud-init user data in TextArea.
      - >-
        Template path: Overview tab edits vCPU, memory GiB, and run strategy (**Always** / **Halted** wire values).
        Storage tab edits boot disk GiB and optional additional data disks. Network, SSH, and Image & user data tabs
        capture optional placement and access fields per fulfillment spec.
      - Next sends customization payload to BFF; BFF merges into draft and validates required template fields
        (name, boot disk, cores, memory, additional disk list format) when mode is template.

  - id: cvm_wizard_review_create
    title: Review and create
    goal: Confirm flow-specific expanded review sections and optional start-after-create checkbox, then provision.

    ui:
      components:
        - WizardStep
        - Title
        - Content
        - ExpandableSection
        - Checkbox
        - DescriptionList
        - Stack
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - reviewing
      - submitting
      - error_provision_rejected
      - success_modal_closes

    interactions:
      - Read heading and intro, then toggle “Start this virtual machine after creation” (included in finalize payload).
      - Inspect expanded sections rendered for current flow.
      - Click Create virtual machine to call BFF finalize; on success close modal, then SPA POST
        **POST /api/fulfillment/v1/compute_instances** when integrated (and invalidate VM queries); on error show Alert and remain on review.

transitions:
  - from: cvm_modal_closed
    action: open create vm from dashboard, My VMs header, or toolbar
    to: cvm_modal_open
  - from: tud_dashboard_home
    action: click create virtual machine
    to: cvm_modal_open
  - from: mvm_list_view
    action: open create vm from list affordance
    to: cvm_modal_open
  - from: vmc_catalog_grid
    action: open wizard from template with start index at template step
    to: cvm_wizard_template
  - from: vmc_catalog_provider_global
    action: open wizard from template with start index at template step
    to: cvm_wizard_template
  - from: mvm_detail_drawer
    action: choose clone from VM
    to: cvm_wizard_source_clone
  - from: cvm_modal_open
    action: open modal default start at deployment details
    to: cvm_wizard_deployment_details
  - from: cvm_modal_open
    action: open modal from catalog preset start index
    to: cvm_wizard_template
  - from: cvm_modal_open
    action: open modal from clone preset start index
    to: cvm_wizard_source_clone
  - from: cvm_wizard_deployment_details
    action: click next with deployment new
    to: cvm_wizard_guest_os
  - from: cvm_wizard_deployment_details
    action: click next with deployment template
    to: cvm_wizard_template
  - from: cvm_wizard_deployment_details
    action: click next with deployment clone
    to: cvm_wizard_source_clone
  - from: cvm_wizard_guest_os
    action: click next
    to: cvm_wizard_boot_source
  - from: cvm_wizard_boot_source
    action: click next
    to: cvm_wizard_compute
  - from: cvm_wizard_compute
    action: click next
    to: cvm_wizard_customization
  - from: cvm_wizard_template
    action: click next
    to: cvm_wizard_customization
  - from: cvm_wizard_source_clone
    action: click next
    to: cvm_wizard_review_create
  - from: cvm_wizard_customization
    action: click next for new or template path

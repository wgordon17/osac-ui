validation_rules:
  - field: bff_authoritative_validation
    status: prototype_restore_only
    rules:
      - rule: bff_advance_and_finalize_are_authoritative
        note: >-
          **RESTORE / not shipped.** Prototype BFF session advance/finalize was authoritative.
          Shipped wizard uses client_step_orchestration and validateWizardStep / validateWizardForFinalize
          in wizardBuild.ts instead.

  - field: guest_os_family_and_type
    when: deployment equals new
    rules:
      - rule: both_required_before_next
        note: >-
          Next disabled until osFamilyNew set (card selection) and osTypeNew non-empty; version
          FormSelect stays visible but disabled with “You need to choose an OS first.” until a platform
          is chosen.
  - field: boot_source
    when: deployment equals new
    rules:
      - rule: exactly_one_choice_required
  - field: cpu_memory
    when: deployment equals new
    rules:
      - rule: non_empty_trimmed_strings_required
        note: Blank trimmed values disable Next.
  - field: template_selection
    when: deployment equals template
    rules:
      - rule: selected_template_id_required
  - field: template_boot_disk_size_gib
    when: deployment equals template on customization step
    rules:
      - rule: integer_gib_within_bounds
        note: >-
          Required positive integer GiB; seeded from selected template **defaults.boot_disk.size_gib**; min/max
          documented with product (demo may use e.g. 1–512 GiB until policy API exists).
  - field: clone_source_and_name
    when: deployment equals clone
    rules:
      - rule: source_vm_id_required
      - rule: new_name_trim_non_empty
      - rule: fleet_must_not_be_empty
  - field: template_vm_name
    when: deployment equals template on customization step
    rules:
      - rule: trim_non_empty_required
  - field: cloud_init_user_data
    when: deployment equals new
    rules:
      - rule: optional_multiline
        note: >-
          Empty cloudInitUserDataNew is omitted; non-empty value is passed on draft and mapped to
          spec.userData on finalize (demo BFF).

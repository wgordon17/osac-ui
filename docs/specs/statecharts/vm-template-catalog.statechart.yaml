id: vm-template-catalog
title: VM Template Catalog Statechart
source_flow: ../ui-flows/vm-template-catalog.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  osFilters:
    rhel: false
    windows: false
    linux: false
  workloadFilters:
    highPerformance: false
    machineLearning: false
    dataProcessing: false
    analytics: false
  searchTerm: ''
  selectedCatalogItemId: null
  templateDetailTab: details

initial: vmc_catalog_grid

states:
  vmc_catalog_grid:
    permissions:
      - view_catalog
      - create_from_template
    on:
      OPEN_FROM_TENANT_USER_NAV:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      OPEN_FROM_TENANT_ADMIN_NAV:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      RESELECT_TEMPLATE_NAV:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      SET_SEARCH_TERM:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      TOGGLE_OS_FILTER:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      TOGGLE_WORKLOAD_FILTER:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      CLEAR_CATEGORY_FILTERS:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      SELECT_TEMPLATE_CARD:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")

  vmc_catalog_drawer_open:
    permissions:
      - view_catalog
      - create_from_template
    on:
      CLOSE_TEMPLATE_DRAWER:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      RESELECT_TEMPLATE_NAV:
        target: vmc_catalog_grid
        guard: can(role, "view_catalog")
      SET_TEMPLATE_DETAIL_TAB:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")
      INVOKE_CREATE_FROM_TEMPLATE:
        target: cvm_wizard_template
        guard: can(role, "create_from_template")
      SET_SEARCH_TERM:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")
      TOGGLE_OS_FILTER:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")
      TOGGLE_WORKLOAD_FILTER:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")
      CLEAR_CATEGORY_FILTERS:
        target: vmc_catalog_drawer_open
        guard: can(role, "view_catalog")

  vmc_catalog_provider_global:
    permissions:
      - manage_global_templates
      - create_from_template
    on:
      INVOKE_CREATE_FROM_TEMPLATE:
        target: cvm_wizard_template
        guard: can(role, "create_from_template")

  cvm_wizard_template:
    external: create-virtual-machine-wizard.statechart.yaml#cvm_wizard_template

ai-hints:
  summary: >-
    Template browsing and create-from-template initiation machine for tenant and provider contexts.
    Tenant flow uses sidebar category checkboxes (OS and workload), keyword search, and a detail
    drawer with a Details-only surface (no Parameters tab). Card click or keyboard Enter/Space opens drawer.
    Re-selecting Templates nav closes drawer. Create from template is initiated from the drawer
    header action and enters cvm_wizard_template.
  styling_invariants:
    - Preserve class hooks used by CSS contract in ui-flows/vm-template-catalog.yaml.
    - Drawer-open state must map to isExpanded true with end-position panel, focus trap enabled, and overlay layering above the catalog grid.
    - Grid state must keep keyboard-focusable card wrappers with focus-visible outline behavior.
    - SELECT_TEMPLATE_CARD must not toggle any persistent selected-card visual state; it only sets selectedTemplateId and opens drawer content.
    - Card UI in this flow must not include per-card Checkbox or Radio selection controls.
    - Catalog card visual anatomy must match create-vm template-step cards (icon/title/subtitle, CPU-Memory-Storage row, divider, Network/Access/Workload text rows).
    - Card border remains visible as a persistent base affordance across idle, hover, and focus states.
    - Catalog grid must present exactly three cards per row.
    - Catalog OS icons must match wizard template-card icon set and sizing behavior.
    - Below-divider card metadata is limited to a compact workload line only (no Network or Access lines).
    - Card body must not render bootSourcePvc text in the catalog card surface.
    - Template title style is compact/refined compared with prior large title treatment.
    - Description/resource text color aligns with workload text color.
    - The page uses one vertical scroll container; avoid independent nested scroll areas for catalog versus drawer.
    - Drawer must not render Parameters tab; Details is the only drawer detail surface.
    - Drawer header includes OS icon tile in the upper-left using the same icon system as catalog cards.
    - Drawer header includes a short description under the template name.
    - Drawer Details fields are limited to Guest operating system, CPU, Memory, Storage, and Workload.
    - Drawer shows disabled informational switches for Headless mode, Guest system log access, and Deletion protection.
    - Filtering/search events must not remount the sticky toolbar or break shared page scrollport behavior.
  impossibleStates:
    - role=tenantUser and state=vmc_catalog_provider_global
    - state=vmc_catalog_drawer_open and selectedTemplateId=null

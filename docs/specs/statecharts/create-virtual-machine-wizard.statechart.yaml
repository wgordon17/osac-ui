id: create-virtual-machine-wizard
title: Create Virtual Machine Wizard Statechart
source_flow: ../ui-flows/create-virtual-machine-wizard.yaml
rbac_ref: ../rbac.yaml

implementation_status:
  as_of: '2026-06'
  shipped_path: [cvm_wizard_template, cvm_wizard_customization, cvm_wizard_review_create]
  orchestration: client-side (wizardBuild.ts); finalize POST compute_instances

context:
  role: null
  tenantId: null
  deploymentMethod: template
  selectedCatalogItemId: null
  isSubmitting: false
  validationError: null

initial: cvm_modal_closed

states:
  cvm_modal_closed:
    permissions:
      - open_create_vm
      - create_from_template
    on:
      OPEN_CREATE_VM:
        target: cvm_wizard_template
        guard: can(role, "open_create_vm")
      OPEN_FROM_TEMPLATE:
        target: cvm_wizard_template
        guard: can(role, "create_from_template")

  cvm_wizard_template:
    permissions:
      - use_vm_wizard
      - create_from_template
    on:
      NEXT: { target: cvm_wizard_customization }
      CLOSE: { target: cvm_modal_closed }

  cvm_wizard_customization:
    permissions: [use_vm_wizard]
    on:
      NEXT: { target: cvm_wizard_review_create }
      BACK: { target: cvm_wizard_template }
      CLOSE: { target: cvm_modal_closed }

  cvm_wizard_review_create:
    permissions:
      - use_vm_wizard
      - provision_vm
    on:
      CREATE_SUCCESS:
        target: mvm_list_view
        guard: can(role, "provision_vm")
      BACK: { target: cvm_wizard_customization }
      CLOSE: { target: cvm_modal_closed }

  mvm_list_view:
    external: manage-virtual-machines.statechart.yaml#mvm_list_view

  # RESTORE — multi-path prototype states (not shipped):
  cvm_modal_open:
    permissions: [use_vm_wizard]
    meta: { status: deferred }
  cvm_wizard_deployment_details:
    permissions: [use_vm_wizard]
    meta: { status: deferred }
  cvm_wizard_guest_os:
    permissions: [use_vm_wizard]
    meta: { status: deferred }
  cvm_wizard_boot_source:
    permissions: [use_vm_wizard]
    meta: { status: deferred }
  cvm_wizard_compute:
    permissions: [use_vm_wizard]
    meta: { status: deferred }
  cvm_wizard_source_clone:
    permissions: [use_vm_wizard, clone_vm]
    meta: { status: deferred }

ai-hints:
  summary: >-
    **Shipped:** template-only create VM machine — template → customization → review → provision.
    Client-side validation in wizardBuild.ts; POST /api/fulfillment/v1/compute_instances on finalize.
    Deferred multi-path states (deployment, guest-os, boot-source, compute, clone) remain in ui-flow
    worksheets for RESTORE. No BFF wizard session API.

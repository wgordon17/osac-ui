# Normative: VM catalog + create-vm wizard share compute_instance_catalog_items
# Spec-only — implementation follows implementer_agent block below.

version: 1
id: template-catalog-wizard-api-alignment
title: Align CatalogPage and CreateVmWizard with compute_instance_catalog_items

related_specs:
  - docs/specs/backend-fulfillment.yaml
  - docs/specs/ui-flows/vm-template-catalog.yaml
  - docs/specs/ui-flows/create-virtual-machine-wizard.yaml
  - docs/specs/FLOW-INDEX.yaml
  - docs/specs/demo-application-build-spec.yaml

problem_statement:
  description: >-
    The VM catalog and Create VM wizard **catalog step** must list **compute_instance_catalog_items**
    (published curated offerings). Each catalog item references an underlying **compute_instance_template**
    via its `template` field. VM create POSTs use **`spec.catalog_item`**, not `spec.template`.
    Customization defaults still resolve from the underlying template via a secondary templates query.

architectural_rules:
  single_source:
    rule: >-
      Both **CatalogPage** and the wizard **catalog step** MUST obtain list data via the **same** fulfillment REST paths:
      `GET /api/fulfillment/v1/compute_instance_catalog_items` and `GET /api/fulfillment/v1/compute_instance_catalog_items/{id}`.
      Only **published** items are shown in tenant-facing pickers.
    forbidden: >-
      Divergent lists where catalog uses catalog items API and wizard uses compute_instance_templates directly for picker cards.
  underlying_template_defaults:
    rule: >-
      **GET /api/fulfillment/v1/compute_instance_templates** remains in use for resolving customization defaults
      (cores, memory, boot disk) from the selected catalog item's `template` reference — not for the picker inventory.
  caching:
    rule: >-
      Prefer **one** TanStack Query definition (`queryKey: compute_instance_catalog_items`) so catalog filters and wizard picker stay coherent.
  wire_vs_ui_model:
    rule: >-
      Implement **normalizeComputeInstanceCatalogItem** in libs/api-contracts — single mapper used by both surfaces.
  create_payload:
    rule: >-
      Wizard finalize serializes **`spec.catalog_item`** via `serializeComputeInstanceForCreate({ specCatalogItemOnly: true })`.
      **`spec.template_parameters`** is omitted (empty) until field_definitions-driven customization ships.

wizard_integration:
  catalog_step:
    rule: >-
      **TemplateStep** (`cvm_wizard_template`, nav label "Catalog") lists published catalog items from the shared hook;
      loading/error/empty states match catalog expectations.
  preset_from_catalog:
    rule: >-
      When opening the wizard from catalog with a preset catalog item id, selection MUST resolve by **id** against the same cached list.

verification:
  manual:
    - Catalog and wizard catalog step Network tab show **compute_instance_catalog_items** for picker inventory.
    - Create VM POST body includes **`spec.catalog_item`** and does not set **`spec.template`**.
  automated:
    - Frontend unit tests for catalog item normalize and wizardBuild catalog_item payload.

implementer_agent:
  prompt_implementation: |
    ## Mission
    Catalog + wizard picker use **compute_instance_catalog_items**; create POST uses **spec.catalog_item**.
    Underlying templates query supports customization defaults only.

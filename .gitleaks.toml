# rh-pre-commit passes this file via --additional-config when present.
# See: https://patterns.security.redhat.com/docs

[allowlist]
description = "Package manager lock files (auto-generated, not secrets)"
paths = [
  '''(?:^|/)pnpm-lock\.yaml$''',
  '''(?:^|/)package-lock\.json$''',
  '''(?:^|/)yarn\.lock$''',
]
